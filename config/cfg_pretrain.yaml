defaults:
  - arch/net@arch: hrm
  - arch/size@arch: XL
  - data: hlm
  - _self_

hydra:
  output_subdir: null

global_batch_size: 196608  # Batch size (tokens)
micro_batch_size: null     # Per-forward token budget; set smaller than global_batch_size for gradient accumulation
epochs: 4
checkpoint_interval: 1

lr: 2.2e-4
lr_min_ratio: 1.0
lr_warmup_steps: 2000

weight_decay: 0.1
beta1: 0.9
beta2: 0.95

ema: 0.9999
fwd_bwd_dtype: bfloat16
compile_train: true

project_name: null
run_name: null
checkpoint_path: null

resume_from: null
resume_tag: null
resume_epoch: null
resume_skip_data: true
init_from_safetensors: null
weights_only_resume_from_ema: false

seed: 0
max_steps: null
save_checkpoints: true
log_interval: 5
loss_history_path: null
trainable_param_substrings: null
rwkv_mem_loss_mode: ce
rwkv_mem_kl_weight: 0.0
rwkv_mem_kl_temperature: 2.0
rwkv_mem_reset_each_forward: true
