defaults:
  - arch/net@arch: hrm
  - arch/size@arch: XL
  - data: sft
  - _self_

hydra:
  output_subdir: null

# REQUIRED — set via CLI override:
#   resume_from=/path/to/pretrain_ckpt
#   data.path=/path/to/prepared_sft_data
#   +checkpoint_path=/path/to/sft_out
resume_from: ???
weights_only_resume_from_ema: false   # Set true to swap EMA into model and reset optim

global_batch_size: 32768
epochs: 5
checkpoint_interval: 1

lr: 3.0e-5
lr_min_ratio: 0.1
lr_warmup_steps: 0

arch:
  bp_warmup_ratio: 0.0   # SFT: no BP warmup (use bp_max_steps from step 1)

weight_decay: 0.1
beta1: 0.9
beta2: 0.95

# EMA decay tuned for short SFT runs. At ~1300 steps the EMA buffer ends up
# tracking mostly SFT trajectory, and using --use-ema at eval gives a small
# regularization boost over raw weights.
ema: 0.999
