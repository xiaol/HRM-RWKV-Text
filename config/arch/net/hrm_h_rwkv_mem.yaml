name: baselines.hrm_nocarry_bp_warmup@HierarchicalReasoningModel
head: lm_head@LMHead

half_layers: True

H_cycles: 2
L_cycles: 3
H_override:
  rwkv_mem_enabled: true
  rwkv_mem_mode: delta_rule
  rwkv_mem_rank: 8
  rwkv_mem_alpha: 16.0
  rwkv_mem_beta_bias_init: -1.5
  rwkv_mem_normalize_qk: true
  rwkv_mem_couple_lambda: true
  rwkv_mem_state_update_mode: standard
  rwkv_mem_rankwise_gates: true
  rwkv_mem_num_state_heads: 1
  rwkv_mem_base_slice_ref_width: 8
  rwkv_mem_online_gain: 0.05
  rwkv_mem_memory_write_granularity: token
  rwkv_mem_stateful: false
  rwkv_mem_trainable_delta_scale: false
  rwkv_mem_delta_scale_init: 1.0
  rwkv_mem_delta_scale_max: 2.0
  rwkv_mem_delta_scale_granularity: layer
  rwkv_mem_delta_o_rmsnorm: false
  rwkv_mem_delta_o_rmsnorm_eps: 1e-6
  rwkv_mem_head_size: 64
  rwkv_mem_backend: auto
  rwkv_mem_chunk_len: 16
  rwkv_mem_scale: 1.0
  rwkv_mem_output_init: zero
  rwkv_mem_output_init_scale: 0.02
  rwkv_mem_delta_heads: [q, k, v, o]
  rwkv_mem_separate_delta_projections: false

bp_warmup_ratio: 0.2
bp_max_steps: 5
